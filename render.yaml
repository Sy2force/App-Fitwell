services:
  - type: web
    name: fitwell-monolith
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: fitwell-monolith.onrender.com,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://fitwell-monolith.onrender.com
      - key: RENDER
        value: "True"

databases:
  - name: fitwell-db
    plan: free
