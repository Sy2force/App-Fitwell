services:
  - type: web
    name: fitwell
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --log-file - --capture-output --log-level debug
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: fitwell-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: fitwell-mkqi.onrender.com,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://fitwell-mkqi.onrender.com
      - key: RENDER
        value: "True"

databases:
  - name: fitwell-db
    plan: free
